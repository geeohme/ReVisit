<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Public+Sans:wght@400;500;600&family=Schibsted+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="theme.js"></script>
  <style>
    body {
      width: 240px;
      margin: 0;
      background: var(--color-bg-panel);
      color: var(--color-dark-text);
    }
    .popup-head {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
    }
    .popup-mark {
      width: 22px; height: 25px; border-radius: 4px 4px 4px 0;
      background: linear-gradient(160deg, #F4E7CC, #E8D3A8);
      border: 1px solid #EFE6D4; position: relative; flex: none;
    }
    .popup-mark .chk { position: absolute; left: 4px; bottom: 4px; color: var(--color-primary); font-weight: 700; font-size: 12px; line-height: 1; }
    .popup-name { font-family: var(--font-display); font-weight: 600; font-size: 16px; }
    .popup-name b { color: var(--color-primary); }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      border: none;
      background: var(--color-bg-panel);
      color: var(--color-dark-text);
      width: 100%;
      text-align: left;
      font-family: var(--font-ui);
      font-size: 14px;
      transition: background 0.15s;
    }
    .menu-item:hover { background: var(--color-hover-bg); }
    .menu-item svg { width: 18px; height: 18px; stroke: var(--color-primary); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; flex: none; }
    .menu-item.primary { color: var(--color-primary); font-weight: 600; }
  </style>
</head>
<body>
  <div class="popup-head">
    <span class="popup-mark"><span class="chk">✓</span></span>
    <span class="popup-name">Re<b>Visit</b></span>
  </div>
  <button class="menu-item primary" id="add-bookmark">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    ReVisit this Page
  </button>
  <button class="menu-item" id="open-list">
    <svg viewBox="0 0 24 24"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H3z"/><path d="M3 7V5a2 2 0 0 1 2-2h4l2 2"/></svg>
    ReVisit List
  </button>
  <script src="popup.js"></script>
</body>
</html>
